<!DOCTYPE html>
<html lang="en" class="bg-primary">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@300..700&family=Teko:wght@300..700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="/nostalgia-logo.png" type="image/png">
    <title>Nostalgia</title>
    <link rel="stylesheet" href="src/css/main/input.css">
    <script defer src="src/js/main/animations.js"></script>
</head>
<body class="relative">
    <div id="header" class="relative animate-[moveSky_linear_infinite_15s] w-full h-[20dvh] flex justify-center">
        <img src="/nostalgia-logo.png" alt="" class="absolute top-1 h-16 md:h-20">
    </div>

    <div id="profile-wrapper" class="flex justify-center items-center">
        <div id="frame" class="relative max-w-[90%] sm:max-w-[70%] md:max-w-[50%] flex justify-center items-center">
            <img src="/wood/wooden-frame.png" alt="" class="relative max-h-auto">
            <img src="/name.png" alt="" class="absolute z-100 -top-8 w-full">
            <p class="md:text-xl text-base absolute font-['Press_Start_2P'] sm:-top-[3%] lg:-top-[1%] -top-[7%] z-200">Bem-vindo,</p>
            <p class="md:text-3xl text-lg absolute font-['Press_Start_2P'] sm:top-[2%] lg:top-[4%] -top-[1%] z-200">Name</p>
            <img src="/frame.png" alt="" class="absolute w-[40%] sm:w-[35%] z-100">
            <img src="/pfp-crop.jpeg" alt="" class="absolute w-[40%] sm:w-[35%]">
            <img id="pause-profile" class="absolute pause h-8 sm:h-10 md:h-12 lg:right-32 right-12" src="/ui/pause.png" alt="">
        </div>
    </div>
    
    <div id="back-black" class="bg-black/60 hidden h-dvh fixed inset-0 z-500"></div>

    <div id="profile-edit-panel" class="fixed flex justify-center items-center z-1000 inset-0 translate-y-[100dvh] transition-transform duration-1000">
        <img class="h-[90dvw] w-[90dvw] sm:w-[70dvw] sm:h-auto md:max-w-[60dvw] lg:w-[50dvw]" src="/wood/wooden-frame.png" alt="">
        <h1 class="absolute text-xl font-bold lg:text-3xl tracking-widest font-['Press_Start_2P'] top-[28%] lg:top-[22%]">Editar</h1>
        <div class="flex flex-col lg:gap-8 gap-4 absolute top-[36%] md:top-[32%] lg:top-[30%]">
            <label for="pfp-change" id="pfp-change-wrapper" class="relative flex items-center justify-center w-[80dvw] sm:w-[55dvw] md:max-w-[40dvw]">
                <img src="/frame.png" alt="" class="w-[35%] sm:w-[30%] z-100">
                <img src="/pfp-crop.jpeg" alt="" class="absolute w-[30%] sm:w-[25%]">
                <input type="file" name="pfp_img" id="pfp-change" class="absolute hidden">
            </label>
            <div id="profile-name-wrapper" class="relative flex items-center w-[80dvw] sm:w-[55dvw] md:max-w-[40dvw]">
                <input class="peer px-3 py-1.5 md:px-5 md:py-2.5 bg-wood w-full rounded-sm" type="text">
                <p class="peer-focus:opacity-0 absolute bg-transparent tracking-tighter px-3 py-1.5 pointer-events-none font-['Press_Start_2P'] lg:text-lg text-sm text-write-wood">Nome</p>
            </div>
        </div>
        <div id="btns-wrapper" class="absolute flex gap-4 md:gap-6 lg:gap-8 justify-center top-[63%] lg:top-[66%]">
            <img id="close-profile-edit" src="/ui/x.png" alt="" class="x h-10 lg:h-14">
            <img src="/ui/check.png" alt="" class="check h-10 lg:h-14">
        </div>
    </div>

    <div id="item-edit-panel" class="fixed flex justify-center items-center z-1000 inset-0 translate-y-[100dvh] transition-all duration-1000">
        <img class="h-[90dvw] w-[90dvw] sm:w-[70dvw] sm:h-auto md:max-w-[60dvw] lg:w-[50dvw]" src="/wood/wooden-frame.png" alt="">
        <h1 class="absolute text-xl font-bold lg:text-3xl tracking-widest font-['Press_Start_2P'] top-[28%] lg:top-[22%]">Editar</h1>
        <div class="flex flex-col lg:gap-8 gap-4 absolute top-[36%]">
            <div id="item-img-wrapper" class="relative flex items-center w-[80dvw] sm:w-[55dvw] md:max-w-[40dvw]">
                <input class="peer px-3 py-1.5 md:px-5 md:py-2.5 bg-wood w-full rounded-sm" type="text">
                <p class="peer-focus:opacity-0 absolute tracking-tighter px-3 py-1.5 pointer-events-none font-['Press_Start_2P'] md:text-xl text-write-wood">Imagem</p>
            </div>
            <div id="item-name-wrapper" class="relative flex items-center w-[80dvw] sm:w-[55dvw] md:max-w-[40dvw]">
                <input class="peer px-3 py-1.5 md:px-5 md:py-2.5 bg-wood w-full rounded-sm" type="text">
                <p class="peer-focus:opacity-0 absolute bg-transparent tracking-tighter px-3 py-1.5 pointer-events-none font-['Press_Start_2P'] lg:text-lg text-sm text-write-wood">Nome da memória</p>
            </div>
            <div id="item-name-wrapper" class="relative flex items-center w-[80dvw] sm:w-[55dvw] md:max-w-[40dvw]">
                <input class="peer px-3 py-1.5 md:px-5 md:py-2.5 bg-wood w-full rounded-sm" type="text">
                <p class="peer-focus:opacity-0 absolute bg-transparent tracking-tighter px-3 py-1.5 pointer-events-none font-['Press_Start_2P'] lg:text-lg text-sm text-write-wood">Descrição</p>
            </div>
        </div>
        <div id="btns-wrapper" class="absolute flex gap-4 md:gap-6 lg:gap-8 justify-center top-[60%] lg:top-[66%]">
            <img id="close-item-edit" src="/ui/x.png" alt="" class="x h-12 lg:h-16">
            <img id="confirm-item-edit" src="/ui/check.png" alt="" class="check h-12 lg:h-16">
        </div>
    </div>

    <div id="confirm-remove-wrapper" class="fixed inset-0 flex justify-center items-center z-500 translate-y-[100dvh] transition-all duration-1000">
        <img class="w-[70dvw] sm:w-[50dvw] md:max-w-[40dvw] lg:w-[50dvw]" src="/wood/wooden-frame.png" alt="">
        <div id="text-remove-wrapper" class="absolute flex flex-col gap-3 lg:gap-6">
            <h1 class="font-['Press_Start_2P'] text-xl lg:text-3xl">Tem certeza?</h1>
            <div id="btn-confirm-wrapper" class="flex justify-center items-center gap-3 lg:gap-6">
                <img id="remove-item-cancel" src="/ui/x.png" class="x h-10 lg:h-14" alt="">
                <img src="/ui/check.png" class="check h-10 lg:h-14" alt="">
            </div>
        </div>
    </div>

   <div id="shelf-container" class="py-16">
        <div class="shelf w-full py-12">
            <div class="shelf-body">
                <div class="shelf-top h-2 bg-center bg-repeat z-100"></div>
                <div class="shelf-middle relative min-h-10 bg-center bg-repeat z-100 gap-8 grid">
                    <div class="wrapper relative flex justify-center">
                        <div class="shadow-wrapper transition-all duration-200 absolute -top-16 sm:-top-20">
                            <img class="item-img h-24 sm:h-28 transition-all duration-200 hover:-translate-y-2" src="/mordecai.png" alt="">
                            <div class="absolute right-1/2 translate-1/2 -top-16 ">
                                <img class="pause pause-item h-8 scale-0 transiton-all duration-200" src="/ui/pause.png" alt="">
                            </div>
                        </div>
                    </div>
                    <div class="wrapper relative flex justify-center">
                        <div class="shadow-wrapper transition-all duration-200 absolute -top-16 sm:-top-20">
                            <img class="item-img h-24 sm:h-28 transition-all duration-200 hover:-translate-y-2" src="/mordecai.png" alt="">
                            <div class="item-btn-wrapper absolute flex gap-4 justify-center items-center right-1/2 translate-1/2 -top-16 ">
                                <img class="pause pause-item cursor-pointer h-8 scale-0 transiton-all duration-200" src="/ui/pause.png" alt="">
                                <img class="remove-item h-8 cursor-pointer scale-0 transiton-all duration-200" src="/ui/trash.png" alt="">
                            </div>
                        </div>
                    </div>
                    <div class="wrapper relative flex justify-center">
                        <div class="shadow-wrapper transition-all duration-200 absolute -top-16 sm:-top-20">
                            <img class="item-img h-24 sm:h-28 transition-all duration-200 hover:-translate-y-2" src="/mordecai.png" alt="">
                            <div class="absolute right-1/2 translate-1/2 -top-16 ">
                                <img class="pause pause-item h-8 scale-0 transiton-all duration-200" src="/ui/pause.png" alt="">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="h-1.5 line"> </div>
                <div class="shelf-bottom h-9 bg-center bg-repeat z-100"></div>
            </div>
            <div class="shelf-feet-container flex justify-between px-6">
                <div class="shelf-feet h-12 w-12 bg-center"></div>
                <div class="shelf-feet h-12 w-12 bg-center"></div>
            </div>
        </div>
    </div>
    <div id="shelf-container" class="py-16">
        <div class="shelf w-full py-12">
            <div class="shelf-body">
                <div class="shelf-top h-2 bg-center bg-repeat z-100"></div>

                            <img class="item-img h-24 sm:h-28 transition-all duration-200 hover:-translate-y-2" src="/mordecai.png" alt="">
                            <div class="absolute right-1/2 translate-1/2 -top-16 ">

                                <img class="pause pause-item h-8 scale-0 transiton-all duration-200" src="/ui/pause.png" alt="">

                            <div class="absolute right-1/2 translate-1/2 -top-16 ">
                                <img class="pause pause-item h-8 scale-0 transiton-all duration-200" src="/ui/pause.png" alt="">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="h-1.5 line"> </div>
                <div class="shelf-bottom h-9 bg-center bg-repeat z-100"></div>
            </div>
            <div class="shelf-feet-container flex justify-between px-6">
                <div class="shelf-feet h-12 w-12 bg-center"></div>

            </div>
        </div>
    </div>
</body></div>
